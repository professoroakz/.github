name: Execute *

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-all:
    name: Execute All
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Execute * (make all)
      run: |
        echo "Executing * - running all repository operations..."
        make all
        echo "✓ Executed * successfully"
